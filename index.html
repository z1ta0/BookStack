<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="BookStack — Track your reading journey. See your books stacked in a beautiful 3D spine bookshelf." />
  <title>BookStack — Your 3D Reading Shelf</title>
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header id="app-header">
      <div class="header-left">
        <h1 class="logo">
          <span class="logo-icon">📚</span>
          <span class="logo-text">BookStack</span>
        </h1>
      </div>
      <div class="header-right">
        <button id="lang-toggle" class="lang-btn" aria-label="Toggle language">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
            <path d="M2 12h20"></path>
          </svg>
        </button>
      </div>
    </header>

    <!-- Main Content -->
    <main id="main-content">
      <!-- Left Panel: Fixed content (Header + Stats) -->
      <div class="left-panel">
        <!-- Height Stats Banner -->
        <section id="height-stats" class="glass-panel">
          <div class="stats-icon">📏</div>
          <div class="stats-content">
            <p id="stats-message" class="stats-message stats-number"></p>
            <p id="stats-books-count" class="stats-count"></p>
          </div>
        </section>
      </div>

      <!-- Right Panel: Scrollable Shelf -->
      <div class="right-panel">
        <section id="shelf-section">
          <div id="shelf-container">
            <div id="book-stack"></div>
            <div id="shelf-surface"></div>
          </div>
          <div id="empty-state" class="glass-panel" style="display:none;">
            <div class="empty-icon">📖</div>
            <p id="empty-title" class="empty-title"></p>
            <p id="empty-subtitle" class="empty-subtitle"></p>
            <button id="empty-cta" class="empty-cta-btn" type="button"></button>
          </div>
        </section>
      </div>
    </main>

    <!-- Add Book FAB -->
    <button id="add-book-fab" aria-label="Add book">
      <span class="fab-icon">+</span>
    </button>

    <!-- Modal Overlay (Add Book) -->
    <div id="modal-overlay" class="modal-overlay" style="display:none;">
      <div class="modal glass-panel" id="add-book-modal">
        <div class="modal-header">
          <h2 id="modal-title"></h2>
          <button id="modal-close" class="modal-close-btn">&times;</button>
        </div>
        <div class="modal-body">
          <div class="search-input-wrapper">
            <input type="text" id="search-input" autocomplete="off" />
            <div id="search-spinner" class="spinner" style="display:none;"></div>
          </div>
          <div id="search-results" class="search-results"></div>
        </div>
      </div>
    </div>

    <!-- Modal Overlay (Book Details) -->
    <div id="details-modal-overlay" class="modal-overlay" style="display:none;">
      <div class="modal glass-panel" id="book-details-modal">
        <div class="modal-header">
          <h2 id="details-modal-title">Book Details</h2>
          <button id="details-modal-close" class="modal-close-btn">&times;</button>
        </div>
        <div class="modal-body details-body">
          <div id="details-cover-container"></div>
          <div id="details-info-container">
             <h3 id="details-title"></h3>
             <p id="details-author"></p>
             <p id="details-pages"></p>
             <button id="details-remove-btn" class="details-remove-btn"></button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
